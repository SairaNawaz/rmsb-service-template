name: CI — Build & Push Images

# TODO: update service name in the image tag below

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  OWNER: kloudius
  # TODO: update SERVICE_NAME to match your service (e.g. s2, hr, finance)
  SERVICE_NAME: svc

jobs:
  build:
    name: Build Service Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: ghcr.io/${{ env.OWNER }}/rmsb-${{ env.SERVICE_NAME }}-api:latest
          # TODO: update VITE_SERVICE_BASE to match your path_prefix (e.g. /s2)
          build-args: |
            VITE_SERVICE_BASE=/${{ env.SERVICE_NAME }}

      - name: Trigger dashboard deploy
        if: github.event_name == 'push'
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ env.OWNER }}/rmsb-dashboard/dispatches \
            -d '{"event_type":"service-deploy"}'
