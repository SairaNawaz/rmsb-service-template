name: CI — Build & Push Images

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  SERVICE_NAME: ${{ vars.SERVICE_NAME }}

jobs:
  build:
    name: Build Service Image
    runs-on: ubuntu-latest
    environment: ${{ vars.DEPLOY_ENV }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Set lowercase owner
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: ghcr.io/${{ env.OWNER }}/rmsb-${{ env.SERVICE_NAME }}-api:latest
          build-args: |
            VITE_BASE_PATH=${{ vars.VITE_BASE_PATH }}

      - name: Trigger dashboard deploy
        if: github.event_name == 'push'
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository_owner }}/${{ vars.DASHBOARD_REPO }}/dispatches \
            -d '{"event_type":"service-deploy"}'
