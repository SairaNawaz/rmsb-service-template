# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.override.yml  —  local dev infrastructure
#
# Docker Compose merges this automatically when you run `docker compose up`.
# It adds a local postgres so you can develop without the full dashboard.
#
# Never commit this to the dashboard repo — it is for local dev only.
# ─────────────────────────────────────────────────────────────────────────────

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
